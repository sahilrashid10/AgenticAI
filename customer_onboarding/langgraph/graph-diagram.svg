<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .errorBox { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
      .text { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 600; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #475569; font-weight: 600; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 28px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#bg)" />

  <text x="40" y="44" class="title">LangGraph Customer Onboarding Flow</text>
  <text x="40" y="72" class="subtitle">This shows the current routing in customer_onboarding/langgraph</text>

  <!-- START -->
  <rect x="70" y="210" width="110" height="56" class="box" />
  <text x="127" y="244" text-anchor="middle" class="text">START</text>

  <!-- validate -->
  <rect x="230" y="200" width="150" height="76" class="box" />
  <text x="305" y="234" text-anchor="middle" class="text">validate</text>
  <text x="305" y="256" text-anchor="middle" class="small">checks email format</text>

  <!-- validation error -->
  <rect x="430" y="70" width="170" height="76" class="errorBox" />
  <text x="515" y="104" text-anchor="middle" class="text">validation_error</text>
  <text x="515" y="126" text-anchor="middle" class="small">invalid email path</text>

  <!-- exists -->
  <rect x="430" y="200" width="150" height="76" class="box" />
  <text x="505" y="234" text-anchor="middle" class="text">exists</text>
  <text x="505" y="256" text-anchor="middle" class="small">checks duplicate email</text>

  <!-- exists error -->
  <rect x="630" y="70" width="170" height="76" class="errorBox" />
  <text x="715" y="104" text-anchor="middle" class="text">exists_error</text>
  <text x="715" y="126" text-anchor="middle" class="small">duplicate email path</text>

  <!-- save -->
  <rect x="630" y="200" width="150" height="76" class="box" />
  <text x="705" y="234" text-anchor="middle" class="text">save</text>
  <text x="705" y="256" text-anchor="middle" class="small">writes customer data</text>

  <!-- email -->
  <rect x="840" y="200" width="150" height="76" class="box" />
  <text x="915" y="234" text-anchor="middle" class="text">email</text>
  <text x="915" y="256" text-anchor="middle" class="small">generates welcome email</text>

  <!-- checklist -->
  <rect x="1030" y="200" width="150" height="76" class="box" />
  <text x="1105" y="234" text-anchor="middle" class="text">checklist</text>
  <text x="1105" y="256" text-anchor="middle" class="small">generates task list</text>

  <!-- END -->
  <rect x="1070" y="360" width="100" height="56" class="box" />
  <text x="1120" y="394" text-anchor="middle" class="text">END</text>

  <!-- lines -->
  <path d="M180 238 L230 238" class="line" />
  <path d="M380 220 C400 205, 405 170, 430 145" class="line dashed" />
  <path d="M380 238 L430 238" class="line" />
  <path d="M580 220 C600 205, 605 170, 630 145" class="line dashed" />
  <path d="M580 238 L630 238" class="line" />
  <path d="M780 238 L840 238" class="line" />
  <path d="M990 238 L1030 238" class="line" />
  <path d="M1105 276 L1120 360" class="line" />

  <!-- labels -->
  <text x="405" y="188" class="label">if invalid</text>
  <text x="605" y="188" class="label">if email already exists</text>
</svg>